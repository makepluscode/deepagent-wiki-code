# Ruff version comes from uv.lock (dev dependency). Hooks invoke `uv run` so
# CI and developers share one toolchain.
default_language_version:
  python: python3.11

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (uv)
        entry: uv run ruff check --force-exclude --fix
        language: system
        types_or: [python, pyi]
        pass_filenames: true
      - id: ruff-format
        name: ruff format (uv)
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        pass_filenames: true
